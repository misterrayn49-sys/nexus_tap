<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }
        #balance {
            font-size: 42px;
            font-weight: bold;
            margin-top: 20px;
            color: #f3ba2f;
            text-shadow: 0 0 15px rgba(243, 186, 47, 0.5);
        }
        .coin-container {
            position: relative;
            margin: 40px 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin-container:active {
            transform: scale(0.92);
        }
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #f3ba2f, #d4a017);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 0 30px rgba(243, 186, 47, 0.4);
            border: 8px solid #b3860f;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #888; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .upgrades { display: flex; gap: 10px; margin-top: 20px; }
        button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { background: #30363d; }

        .floating-text {
            position: absolute;
            color: #f3ba2f;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.6s ease-out forwards;
        }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div id="balance">0</div>
    
    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-label">За тап</span>
            <span id="tap-val" class="stat-value">+1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Пасив/сек</span>
            <span id="passive-val" class="stat-value">0</span>
        </div>
    </div>

    <div class="coin-container" id="coin-btn">
        <div id="coin">N</div>
    </div>

    <div class="upgrades">
        <button onclick="buyUpgrade('tap')">Upgrade Tap</button>
        <button onclick="buyUpgrade('passive')">Mining</button>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Початковий стан для всіх однаковий
        let state = JSON.parse(localStorage.getItem('nexus_save')) || {
            balance: 0,
            tapPower: 1,
            passiveIncome: 0,
            tapCost: 100,
            passiveCost: 500
        };

        const clickSound = document.getElementById('click-sound');

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('tap-val').innerText = '+' + state.tapPower;
            document.getElementById('passive-val').innerText = state.passiveIncome;
            localStorage.setItem('nexus_save', JSON.stringify(state));
        }

        function handleTap(e) {
            state.balance += state.tapPower;
            
            // Звук
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {}); 

            // Анімація цифр
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${state.tapPower}`;
            
            const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const y = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 40}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 600);
            
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        const coinBtn = document.getElementById('coin-btn');
        coinBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        coinBtn.addEventListener('mousedown', (e) => { handleTap(e); });

        function buyUpgrade(type) {
            if (type === 'tap' && state.balance >= state.tapCost) {
                state.balance -= state.tapCost;
                state.tapPower += 1;
                state.tapCost = Math.floor(state.tapCost * 2);
                tg.HapticFeedback.notificationOccurred('success');
            } else if (type === 'passive' && state.balance >= state.passiveCost) {
                state.balance -= state.passiveCost;
                state.passiveIncome += 1;
                state.passiveCost = Math.floor(state.passiveCost * 2.5);
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
            updateUI();
        }

        setInterval(() => {
            if (state.passiveIncome > 0) {
                state.balance += state.passiveIncome / 10;
                updateUI();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
