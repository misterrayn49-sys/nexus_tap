<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117; color: white; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; user-select: none; touch-action: manipulation;
        }
        #balance { font-size: 42px; font-weight: bold; margin-top: 20px; color: #f3ba2f; text-shadow: 0 0 15px rgba(243, 186, 47, 0.5); }
        .stats-container { display: flex; gap: 20px; background: rgba(255,255,255,0.05); padding: 15px 30px; border-radius: 20px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #888; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; }
        #coin {
            width: 200px; height: 200px; background: linear-gradient(145deg, #f3ba2f, #d4a017);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 80px; box-shadow: 0 0 30px rgba(243, 186, 47, 0.4); border: 8px solid #b3860f;
            transition: transform 0.05s; cursor: pointer;
        }
        #coin:active { transform: scale(0.92); }
        .upgrades { display: flex; gap: 10px; margin-top: 20px; }
        button { background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Кнопка ТОП */
        .top-btn { margin-top: 20px; background: none; border: 1px solid #f3ba2f; color: #f3ba2f; padding: 5px 20px; border-radius: 20px; font-size: 12px; opacity: 0.7; }
        
        /* Вікно лідерів */
        #ldr-mod { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 100; flex-direction: column; align-items: center; padding-top: 40px; }
        .ldr-row { width: 80%; display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #30363d; }

        .floating-text { position: absolute; color: #f3ba2f; font-size: 28px; font-weight: bold; pointer-events: none; animation: moveUp 0.6s ease-out forwards; }
        @keyframes moveUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div id="balance">0</div>
    <div class="stats-container">
        <div class="stat-item"><span class="stat-label">За тап</span><span id="tap-val" class="stat-value">+1</span></div>
        <div class="stat-item"><span class="stat-label">Пасив/сек</span><span id="passive-val" class="stat-value">0</span></div>
    </div>

    <div id="coin" onclick="handleTap(event)">N</div>

    <div class="upgrades">
        <button onclick="buyUpgrade('tap')">Upgrade Tap</button>
        <button onclick="buyUpgrade('passive')">Mining</button>
    </div>

    <button class="top-btn" onclick="openLdr()">🏆 TOP PLAYERS</button>

    <div id="ldr-mod">
        <h2 style="color: #f3ba2f;">Топ-10</h2>
        <div id="ldr-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">Завантаження...</div>
        <button onclick="closeLdr()" style="margin-top: 20px;">Назад</button>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const FB_URL = "https://nexus-tap-default-rtdb.firebaseio.com/";
        const user = tg.initDataUnsafe?.user || { id: "user_" + Math.floor(Math.random()*1000), first_name: "Гравець" };

        let state = JSON.parse(localStorage.getItem('nexus_save')) || { balance: 0, tapPower: 1, passiveIncome: 0, tapCost: 100, passiveCost: 500 };

        async function sync() {
            try { fetch(`${FB_URL}users/${user.id}.json`, { method: 'PUT', body: JSON.stringify({ name: user.first_name, score: Math.floor(state.balance) }) }); } catch(e){}
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('tap-val').innerText = '+' + state.tapPower;
            document.getElementById('passive-val').innerText = state.passiveIncome;
            localStorage.setItem('nexus_save', JSON.stringify(state));
        }

        function handleTap(e) {
            state.balance += state.tapPower;
            document.getElementById('click-sound').play().catch(()=>{});
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${state.tapPower}`;
            text.style.left = `${e.clientX || e.touches[0].clientX}px`;
            text.style.top = `${e.clientY || e.touches[0].clientY}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 600);
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            if (Math.random() > 0.9) sync();
        }

        async function openLdr() {
            document.getElementById('ldr-mod').style.display = 'flex';
            try {
                const r = await fetch(`${FB_URL}users.json`);
                const d = await r.json();
                const list = document.getElementById('ldr-list');
                list.innerHTML = "";
                Object.values(d).sort((a,b)=>b.score-a.score).slice(0,10).forEach((p,i)=>{
                    list.innerHTML += `<div class="ldr-row"><span>#${i+1} ${p.name}</span><b>${p.score}</b></div>`;
                });
            } catch(e){ document.getElementById('ldr-list').innerText = "Помилка"; }
        }

        function closeLdr() { document.getElementById('ldr-mod').style.display = 'none'; }

        function buyUpgrade(t) {
            if (t==='tap' && state.balance >= state.tapCost) { state.balance -= state.tapCost; state.tapPower++; state.tapCost*=2; }
            else if (t==='passive' && state.balance >= state.passiveCost) { state.balance -= state.passiveCost; state.passiveIncome++; state.passiveCost*=2.5; }
            updateUI(); sync();
        }

        setInterval(() => { if(state.passiveIncome>0) { state.balance += state.passiveIncome/10; updateUI(); } }, 100);
        updateUI(); sync();
    </script>
</body>
</html>
