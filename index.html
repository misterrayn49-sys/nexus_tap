<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }
        #balance {
            font-size: 42px;
            font-weight: bold;
            margin-top: 20px;
            color: #f3ba2f;
            text-shadow: 0 0 15px rgba(243, 186, 47, 0.5);
        }
        .coin-container {
            position: relative;
            margin: 40px 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin-container:active {
            transform: scale(0.92);
        }
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #f3ba2f, #d4a017);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 0 30px rgba(243, 186, 47, 0.4);
            border: 8px solid #b3860f;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #888; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .upgrades { display: flex; gap: 10px; margin-top: 20px; }
        button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Стиль для кнопки лідерів */
        .leader-btn {
            margin-top: 30px;
            background: none;
            border: 1px solid #f3ba2f;
            color: #f3ba2f;
            font-size: 14px;
        }

        /* Вікно лідерів */
        #leaderboard-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .leader-row {
            width: 85%;
            padding: 12px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }

        .floating-text {
            position: absolute;
            color: #f3ba2f;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.6s ease-out forwards;
        }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div id="balance">0</div>
    
    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-label">За тап</span>
            <span id="tap-val" class="stat-value">+1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Пасив/сек</span>
            <span id="passive-val" class="stat-value">0</span>
        </div>
    </div>

    <div class="coin-container" id="coin-btn">
        <div id="coin">N</div>
    </div>

    <div class="upgrades">
        <button onclick="buyUpgrade('tap')">Upgrade Tap</button>
        <button onclick="buyUpgrade('passive')">Mining</button>
    </div>

    <button class="leader-btn" onclick="openLeaders()">🏆 Список лідерів</button>

    <div id="leaderboard-modal">
        <h2 style="color: #f3ba2f;">Топ-10 Гравців</h2>
        <div id="leader-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            Завантаження...
        </div>
        <button onclick="closeLeaders()" style="margin-top: 30px; border-color: #888; color: #888;">Закрити</button>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const FIREBASE_URL = "https://nexus-tap-default-rtdb.firebaseio.com/";
        const user = tg.initDataUnsafe?.user || { id: "test_id", first_name: "Гість" };

        let state = JSON.parse(localStorage.getItem('nexus_save')) || {
            balance: 0,
            tapPower: 1,
            passiveIncome: 0,
            tapCost: 100,
            passiveCost: 500
        };

        const clickSound = document.getElementById('click-sound');

        async function syncWithFirebase() {
            try {
                const data = { name: user.first_name, score: Math.floor(state.balance) };
                await fetch(`${FIREBASE_URL}users/${user.id}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
            } catch (e) {}
        }

        async function openLeaders() {
            document.getElementById('leaderboard-modal').style.display = 'flex';
            const listDiv = document.getElementById('leader-list');
            listDiv.innerHTML = "Завантаження...";
            
            try {
                const res = await fetch(`${FIREBASE_URL}users.json`);
                const data = await res.json();
                listDiv.innerHTML = "";
                
                if (data) {
                    const sorted = Object.values(data).sort((a, b) => b.score - a.score).slice(0, 10);
                    sorted.forEach((p, i) => {
                        listDiv.innerHTML += `
                            <div class="leader-row">
                                <span>#${i+1} ${p.name}</span>
                                <span style="color: #f3ba2f; font-weight: bold;">${p.score.toLocaleString()}</span>
                            </div>`;
                    });
                }
            } catch (e) { listDiv.innerHTML = "Помилка зв'язку"; }
        }

        function closeLeaders() {
            document.getElementById('leaderboard-modal').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('tap-val').innerText = '+' + state.tapPower;
            document.getElementById('passive-val').innerText = state.passiveIncome;
            localStorage.setItem('nexus_save', JSON.stringify(state));
        }

        let tapCount = 0;
        function handleTap(e) {
            state.balance += state.tapPower;
            tapCount++;
            
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {}); 

            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${state.tapPower}`;
            const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const y = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 40}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 600);
            
            updateUI();
            tg.HapticFeedback.impactOccurred('light');

            if (tapCount >= 10) { syncWithFirebase(); tapCount = 0; }
        }

        const coinBtn = document.getElementById('coin-btn');
        coinBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        coinBtn.addEventListener('mousedown', (e) => { handleTap(e); });

        function buyUpgrade(type) {
            if (type === 'tap' && state.balance >= state.tapCost) {
                state.balance -= state.tapCost;
                state.tapPower += 1;
                state.tapCost = Math.floor(state.tapCost * 2);
            } else if (type === 'passive' && state.balance >= state.passiveCost) {
                state.balance -= state.passiveCost;
                state.passiveIncome += 1;
                state.passiveCost = Math.floor(state.passiveCost * 2.5);
            }
            updateUI();
            syncWithFirebase();
        }

        setInterval(() => {
            if (state.passiveIncome > 0) {
                state.balance += state.passiveIncome / 10;
                updateUI();
            }
        }, 100);

        updateUI();
        syncWithFirebase();
    </script>
</body>
</html>
